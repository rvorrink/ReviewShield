    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e6b4a"/>
      <stop offset="0.55" stop-color="#0b4a34"/>
      <stop offset="1" stop-color="#082f22"/>
    </linearGradient>
    <mask id="m" maskUnits="userSpaceOnUse" x="-20" y="-20" width="168" height="168">
